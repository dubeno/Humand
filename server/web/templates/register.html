<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Humand</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/humand-workshop-style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--deep-night);
            padding: 2rem 0;
        }
        
        .register-container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
        }
        
        .register-card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: fadeIn 0.6s ease;
        }
        
        .register-header {
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(212, 149, 108, 0.1) 0%, transparent 100%);
        }
        
        .register-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--warm-orange), var(--hope-green));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            color: var(--deep-night);
        }
        
        .register-title {
            font-size: 1.75rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            color: var(--heal-white);
            margin-bottom: 0.5rem;
        }
        
        .register-subtitle {
            font-size: 0.9rem;
            color: var(--earth-gray);
        }
        
        .register-body {
            padding: 2rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        @media (max-width: 576px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--earth-gray);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .required {
            color: var(--danger-red);
        }
        
        .input-group {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--earth-gray);
            font-size: 1rem;
            z-index: 2;
        }
        
        .form-control,
        .form-select {
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            background: rgba(245, 245, 240, 0.05);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--heal-white);
            font-size: 0.9rem;
            transition: all var(--transition-base);
        }
        
        .form-control:focus,
        .form-select:focus {
            background: rgba(245, 245, 240, 0.08);
            border-color: var(--warm-orange);
            box-shadow: 0 0 0 3px rgba(212, 149, 108, 0.1);
            outline: none;
        }
        
        .btn-register {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, var(--warm-orange), #C88558);
            border: none;
            border-radius: var(--radius-md);
            color: var(--deep-night);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-base);
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 149, 108, 0.4);
        }
        
        .register-footer {
            text-align: center;
            padding: 1.5rem 2rem 2rem;
            border-top: 1px solid var(--border-subtle);
        }
        
        .register-footer a {
            color: var(--warm-orange);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <div class="register-logo">
                    <i class="bi bi-person-plus"></i>
                </div>
                <h1 class="register-title">创建账户</h1>
                <p class="register-subtitle">加入 Humand 审批管理系统</p>
            </div>
            
            <div class="register-body">
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    {{ error }}
                </div>
                {% endif %}
                
                <form method="post" action="/auth/register">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">
                                <i class="bi bi-person-fill"></i> 用户名 <span class="required">*</span>
                            </label>
                            <div class="input-group">
                                <i class="bi bi-person input-icon"></i>
                                <input type="text" 
                                       class="form-control" 
                                       name="username" 
                                       placeholder="3-50个字符"
                                       minlength="3"
                                       maxlength="50"
                                       required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">
                                <i class="bi bi-envelope-fill"></i> 邮箱 <span class="required">*</span>
                            </label>
                            <div class="input-group">
                                <i class="bi bi-envelope input-icon"></i>
                                <input type="email" 
                                       class="form-control" 
                                       name="email" 
                                       placeholder="your@email.com"
                                       required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <i class="bi bi-id-card-fill"></i> 姓名 <span class="required">*</span>
                        </label>
                        <div class="input-group">
                            <i class="bi bi-id-card input-icon"></i>
                            <input type="text" 
                                   class="form-control" 
                                   name="full_name" 
                                   placeholder="请输入真实姓名"
                                   required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">
                                <i class="bi bi-lock-fill"></i> 密码 <span class="required">*</span>
                            </label>
                            <div class="input-group">
                                <i class="bi bi-lock input-icon"></i>
                                <input type="password" 
                                       class="form-control" 
                                       name="password" 
                                       placeholder="至少6个字符"
                                       minlength="6"
                                       required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">
                                <i class="bi bi-shield-check"></i> 确认密码 <span class="required">*</span>
                            </label>
                            <div class="input-group">
                                <i class="bi bi-shield-check input-icon"></i>
                                <input type="password" 
                                       class="form-control" 
                                       name="password_confirm" 
                                       placeholder="再次输入密码"
                                       required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">
                                <i class="bi bi-building"></i> 部门
                            </label>
                            <div class="input-group">
                                <i class="bi bi-building input-icon"></i>
                                <input type="text" 
                                       class="form-control" 
                                       name="department" 
                                       placeholder="如：技术部">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">
                                <i class="bi bi-briefcase"></i> 职位
                            </label>
                            <div class="input-group">
                                <i class="bi bi-briefcase input-icon"></i>
                                <input type="text" 
                                       class="form-control" 
                                       name="position" 
                                       placeholder="如：工程师">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <i class="bi bi-telephone"></i> 电话
                        </label>
                        <div class="input-group">
                            <i class="bi bi-telephone input-icon"></i>
                            <input type="tel" 
                                   class="form-control" 
                                   name="phone" 
                                   placeholder="联系电话">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-register">
                        <i class="bi bi-check-circle"></i> 注册
                    </button>
                </form>
            </div>
            
            <div class="register-footer">
                <p class="text-muted">
                    已有账户？<a href="/auth/login">立即登录</a>
                </p>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 密码确认验证
        document.querySelector('form').addEventListener('submit', function(e) {
            const password = document.querySelector('input[name="password"]').value;
            const confirm = document.querySelector('input[name="password_confirm"]').value;
            
            if (password !== confirm) {
                e.preventDefault();
                alert('两次输入的密码不一致！');
            }
        });
    </script>
</body>
</html>
